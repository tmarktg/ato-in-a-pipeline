apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: readiness-board-dev

resources:
  - ../../base
  - namespace.yaml

patches:
  - target:
      kind: Deployment
      name: readiness-board
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "DEBUG"

images:
  - name: ghcr.io/tmarktg/ato-in-a-pipeline
    newTag: stable
