apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: readiness-board-prod

resources:
  - ../../base
  - namespace.yaml

patches:
  - target:
      kind: Deployment
      name: readiness-board
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"

images:
  - name: ghcr.io/tmarktg/ato-in-a-pipeline
    newTag: stable
