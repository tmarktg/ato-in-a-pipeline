apiVersion: apps/v1
kind: Deployment
metadata:
  name: readiness-board
  labels:
    app: readiness-board
spec:
  replicas: 1
  selector:
    matchLabels:
      app: readiness-board
  template:
    metadata:
      labels:
        app: readiness-board
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: readiness-board
          image: ghcr.io/tmarktg/ato-in-a-pipeline:stable
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "sqlite:////tmp/readiness.db"
            - name: LOG_LEVEL
              value: "INFO"
            - name: PORT
              value: "8000"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
