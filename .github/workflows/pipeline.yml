name: pipeline

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: ruff check app

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: pytest

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install semgrep
      - run: semgrep scan --config .semgrep.yml --severity ERROR --error --json --output semgrep-report.json
      - run: semgrep scan --config .semgrep.yml --severity ERROR --severity WARNING
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.json
          retention-days: 30

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
      - run: gitleaks detect --source . -c .gitleaks.toml --exit-code 1 --report-format json --report-path gitleaks-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30

  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - name: Regenerate compliance matrix + OSCAL from controls.yaml
        run: python scripts/generate_compliance.py
      - name: Fail if generated output differs from committed files
        run: git diff --exit-code docs/compliance-matrix.md compliance/oscal/component-definition.json
      - name: Validate OSCAL component-definition against the schema
        run: python scripts/validate_oscal.py

  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ansible-core ansible-lint
      - working-directory: ansible
        run: ansible-galaxy collection install -r requirements.yml
      - name: ansible-lint (production profile)
        working-directory: ansible
        run: ansible-lint --profile production .
      - name: ansible-playbook --syntax-check
        working-directory: ansible
        run: |
          ansible-playbook --syntax-check playbooks/harden.yml
          ansible-playbook --syntax-check playbooks/provision-demo-env.yml

  terraform:
    runs-on: ubuntu-latest
    services:
      localstack:
        image: localstack/localstack:3.8
        ports:
          - 4566:4566
        env:
          SERVICES: ec2,sts,iam,s3,dynamodb
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"
      - name: Wait for LocalStack
        run: |
          until curl -s http://localhost:4566/_localstack/health | grep -q '"s3"'; do sleep 2; done
      - name: terraform fmt
        run: terraform -chdir=terraform fmt -check -diff
      - name: terraform init
        run: terraform -chdir=terraform init
      - name: terraform validate
        run: terraform -chdir=terraform validate
      - name: terraform plan
        env:
          TF_VAR_localstack_endpoint: "http://localhost:4566"
        run: terraform -chdir=terraform plan -out=tfplan.out
      - uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan.out
          retention-days: 30

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, sast, secrets]
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        id: push
        run: |
          docker build -t "$IMAGE_NAME:${{ github.sha }}" .
          docker push "$IMAGE_NAME:${{ github.sha }}"
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE_NAME:${{ github.sha }}")
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

  scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Unfixed CRITICALs (no vendor patch available) are tracked, not
      # blocking — see docs/adr/0002-trivy-unfixed-cve-policy.md.
      - name: Trivy CRITICAL gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ needs.build.outputs.digest }}
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true
      - name: Trivy HIGH report (non-blocking)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ needs.build.outputs.digest }}
          exit-code: "0"
          severity: HIGH
          format: table
          output: trivy-high-report.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-high-report
          path: trivy-high-report.txt
          retention-days: 30

  sbom:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
      - uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.spdx.json
            sbom.cdx.json
          retention-days: 30

  sign:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v3
      - name: Sign and verify image digest
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "${{ secrets.COSIGN_PRIVATE_KEY }}" > cosign.key
          cosign sign --key cosign.key --yes "${{ needs.build.outputs.digest }}"
          cosign verify --key cosign.pub "${{ needs.build.outputs.digest }}"

  k8s-policy:
    runs-on: ubuntu-latest
    needs: [build, sign]
    steps:
      - uses: actions/checkout@v4
      - uses: helm/kind-action@v1
        with:
          cluster_name: ato-ci
          install_only: true
      - uses: azure/setup-helm@v4
      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash -s -- 5.8.1 /usr/local/bin
      - name: Install Kyverno CLI
        run: |
          curl -sSL -o kyverno-cli.tar.gz https://github.com/kyverno/kyverno/releases/download/v1.18.1/kyverno-cli_v1.18.1_linux_x86_64.tar.gz
          tar -xzf kyverno-cli.tar.gz kyverno
          sudo mv kyverno /usr/local/bin/kyverno
      # Offline check: `kyverno apply` runs each policy against its own
      # pass/fail fixtures — no cluster needed for this part.
      - name: Policy tests (kyverno apply, pass/fail fixtures per policy)
        run: ./policy-tests/run.sh
      - name: Create kind cluster
        run: kind create cluster --name ato-ci --wait 120s
      - name: Install Kyverno
        run: |
          helm repo add kyverno https://kyverno.github.io/kyverno/
          helm repo update
          helm install kyverno kyverno/kyverno -n kyverno --create-namespace --wait --timeout 180s
      - name: Apply Kyverno cluster policies
        run: |
          kubectl apply -f policy/
          kubectl wait --for=condition=Ready clusterpolicy --all --timeout=60s
      # Deploys the exact digest this run just built and signed, proving the
      # policies admit the real supply-chain artifact, not just a fixture.
      - name: Deploy this build's signed image to the dev overlay
        working-directory: k8s/overlays/dev
        run: |
          kustomize edit set image ghcr.io/tmarktg/ato-in-a-pipeline=${{ needs.build.outputs.digest }}
          kubectl create namespace readiness-board-dev --dry-run=client -o yaml | kubectl apply -f -
          kustomize build . | kubectl apply -f -
          kubectl -n readiness-board-dev wait --for=condition=Available deployment/readiness-board --timeout=120s
      - name: Delete kind cluster
        if: always()
        run: kind delete cluster --name ato-ci

  publish:
    runs-on: ubuntu-latest
    needs: [build, scan, sbom, sign]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: imjasonh/setup-crane@v0.4
      - run: crane tag "${{ needs.build.outputs.digest }}" stable
