stages:
  - lint
  - test
  - sast
  - secrets
  - compliance
  - terraform
  - build
  - scan
  - sbom
  - sign
  - k8s-policy
  - publish
  - drift-check

variables:
  GIT_DEPTH: "50"
  IMAGE_TAG: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  DOCKER_HOST: "tcp://docker:2376"
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_TLS_VERIFY: "1"
  DOCKER_CERT_PATH: "/certs/client"

# Writes a docker-compatible auth file so registry-native tools (trivy,
# syft, cosign, crane) can talk to $CI_REGISTRY without needing a Docker
# daemon of their own.
.registry_auth:
  before_script:
    - mkdir -p "${DOCKER_CONFIG:-$HOME/.docker}"
    - |
      cat > "${DOCKER_CONFIG:-$HOME/.docker}/config.json" <<EOF
      {"auths":{"$CI_REGISTRY":{"auth":"$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')"}}}
      EOF

.pip_cache:
  cache:
    key:
      files:
        - requirements-dev.txt
    paths:
      - .cache/pip

lint:
  stage: lint
  except:
    - schedules
  image: python:3.12-slim-bookworm
  extends: .pip_cache
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  before_script:
    - pip install -r requirements-dev.txt
  script:
    - ruff check app

test:
  stage: test
  except:
    - schedules
  image: python:3.12-slim-bookworm
  extends: .pip_cache
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  before_script:
    - pip install -r requirements-dev.txt
  script:
    - pytest
  coverage: '/TOTAL.+ (\d+%)/'

sast:
  stage: sast
  except:
    - schedules
  image:
    name: semgrep/semgrep:latest
    entrypoint: [""]
  script:
    - semgrep scan --config .semgrep.yml --severity ERROR --error --json --output semgrep-report.json
    - semgrep scan --config .semgrep.yml --severity ERROR --severity WARNING
  artifacts:
    when: always
    paths:
      - semgrep-report.json
    expire_in: 30 days

secrets:
  stage: secrets
  except:
    - schedules
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . -c .gitleaks.toml --exit-code 1 --report-format json --report-path gitleaks-report.json
  artifacts:
    when: always
    paths:
      - gitleaks-report.json
    expire_in: 30 days

compliance:
  stage: compliance
  except:
    - schedules
  image: python:3.12-slim-bookworm
  extends: .pip_cache
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  before_script:
    - apt-get update -qq && apt-get install -y -qq git
    - pip install -r requirements-dev.txt
  script:
    - python scripts/generate_compliance.py
    - git diff --exit-code docs/compliance-matrix.md compliance/oscal/component-definition.json
    - python scripts/validate_oscal.py

terraform-fmt:
  stage: terraform
  except:
    - schedules
  image: hashicorp/terraform:1.15
  script:
    - cd terraform
    - terraform fmt -check -diff

terraform-validate:
  stage: terraform
  except:
    - schedules
  image: hashicorp/terraform:1.15
  script:
    - cd terraform
    - terraform init -backend=false
    - terraform validate

terraform-plan:
  stage: terraform
  except:
    - schedules
  image: hashicorp/terraform:1.15
  services:
    - name: localstack/localstack:3.8
      alias: localstack
      variables:
        SERVICES: "ec2,sts,iam,s3,dynamodb"
  variables:
    TF_VAR_localstack_endpoint: "http://localstack:4566"
  before_script:
    - until wget -qO- http://localstack:4566/_localstack/health | grep -q '"s3"'; do sleep 2; done
  script:
    - cd terraform
    - terraform init
    - terraform plan -out=tfplan.out
  artifacts:
    paths:
      - terraform/tfplan.out
    expire_in: 30 days

build:
  stage: build
  except:
    - schedules
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$IMAGE_TAG" .
    - docker push "$IMAGE_TAG"
    - echo "IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE_TAG")" >> build.env
  artifacts:
    reports:
      dotenv: build.env

scan:
  stage: scan
  except:
    - schedules
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  extends: .registry_auth
  needs:
    - job: build
      artifacts: true
  script:
    # Unfixed CRITICALs (no vendor patch available) are tracked, not
    # blocking — see docs/adr/0002-trivy-unfixed-cve-policy.md.
    - trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed "$IMAGE_DIGEST"
    - trivy image --exit-code 0 --severity HIGH --format table --output trivy-high-report.txt "$IMAGE_DIGEST"
  artifacts:
    when: always
    paths:
      - trivy-high-report.txt
    expire_in: 30 days

sbom:
  stage: sbom
  except:
    - schedules
  image:
    name: anchore/syft:latest
    entrypoint: [""]
  extends: .registry_auth
  needs:
    - job: build
      artifacts: true
  script:
    - syft "$IMAGE_DIGEST" -o spdx-json=sbom.spdx.json -o cyclonedx-json=sbom.cdx.json
  artifacts:
    paths:
      - sbom.spdx.json
      - sbom.cdx.json
    expire_in: 30 days

sign:
  stage: sign
  except:
    - schedules
  image:
    name: gcr.io/projectsigstore/cosign:latest
    entrypoint: [""]
  extends: .registry_auth
  needs:
    - job: build
      artifacts: true
  variables:
    COSIGN_YES: "true"
  script:
    - echo "$COSIGN_PRIVATE_KEY" > cosign.key
    - cosign sign --key cosign.key "$IMAGE_DIGEST"
    - cosign verify --key cosign.pub "$IMAGE_DIGEST"

k8s-policy:
  stage: k8s-policy
  except:
    - schedules
  image: docker:27
  services:
    - docker:27-dind
  needs:
    - build
    - sign
  before_script:
    - apk add --no-cache curl bash
    - curl -Lo /usr/local/bin/kind https://kind.sigs.k8s.io/dl/v0.30.0/kind-linux-amd64
    - chmod +x /usr/local/bin/kind
    - curl -Lo /usr/local/bin/kubectl "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - chmod +x /usr/local/bin/kubectl
    - curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash -s -- 5.8.1 /usr/local/bin
    - curl -sSL -o kyverno-cli.tar.gz https://github.com/kyverno/kyverno/releases/download/v1.18.1/kyverno-cli_v1.18.1_linux_x86_64.tar.gz
    - tar -xzf kyverno-cli.tar.gz kyverno && mv kyverno /usr/local/bin/kyverno
    - curl -sSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  script:
    # Offline check: `kyverno apply` runs each policy against its own
    # pass/fail fixtures — no cluster needed for this part.
    - ./policy-tests/run.sh
    - kind create cluster --name ato-ci --wait 120s
    - helm repo add kyverno https://kyverno.github.io/kyverno/
    - helm repo update
    - helm install kyverno kyverno/kyverno -n kyverno --create-namespace --wait --timeout 180s
    - kubectl apply -f policy/
    - kubectl wait --for=condition=Ready clusterpolicy --all --timeout=60s
    # This job builds to $CI_REGISTRY_IMAGE (GitLab's own registry, see the
    # build job above), which the restrict-registry/require-signed-images
    # policies don't allow — GHCR is this project's one approved registry
    # (ADR 0004/README). So this deploys the real, already-published GHCR
    # :stable image (the same default k8s/overlays/dev uses), proving the
    # policies admit a real signed artifact rather than skipping the check.
    - kubectl create namespace readiness-board-dev --dry-run=client -o yaml | kubectl apply -f -
    - kustomize build k8s/overlays/dev | kubectl apply -f -
    - kubectl -n readiness-board-dev wait --for=condition=Available deployment/readiness-board --timeout=120s
  after_script:
    - kind delete cluster --name ato-ci || true

publish:
  stage: publish
  image:
    name: gcr.io/go-containerregistry/crane:debug
    entrypoint: [""]
  extends: .registry_auth
  needs:
    - job: build
      artifacts: true
    - scan
    - sbom
    - sign
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - crane tag "$IMAGE_DIGEST" stable

drift-check:
  stage: drift-check
  only:
    - schedules
  image: hashicorp/terraform:1.15
  services:
    - name: localstack/localstack:3.8
      alias: localstack
      variables:
        SERVICES: "ec2,sts,iam,s3,dynamodb"
  variables:
    TF_VAR_localstack_endpoint: "http://localstack:4566"
  before_script:
    - until wget -qO- http://localstack:4566/_localstack/health | grep -q '"s3"'; do sleep 2; done
  script:
    - cd terraform
    - terraform init
    - terraform apply -auto-approve
    - |
      set +e
      terraform plan -detailed-exitcode -out=driftplan.out > plan-output.txt 2>&1
      exit_code=$?
      cat plan-output.txt
      if [ "$exit_code" -eq 2 ]; then
        echo "Drift detected against LocalStack state — see the drift-plan artifact."
        exit 1
      elif [ "$exit_code" -eq 1 ]; then
        echo "terraform plan errored."
        exit 1
      fi
  artifacts:
    when: always
    paths:
      - terraform/plan-output.txt
      - terraform/driftplan.out
    expire_in: 30 days
